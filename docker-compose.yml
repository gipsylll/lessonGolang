services:

  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}
    image: sushkov-api:${VERSION:-dev}
    container_name: sushkov-api
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      APP_ENV:    ${APP_ENV:-development}
      APP_PORT:   8080
      DB_HOST:    postgres
      DB_PORT:    5432
      DB_USER:    ${DB_USER:-sushkov}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      DB_NAME:    ${DB_NAME:-sushkov}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: sushkov-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER:-sushkov}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      POSTGRES_DB:       ${DB_NAME:-sushkov}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d  # SQL-файлы выполнятся при первом старте
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sushkov} -d ${DB_NAME:-sushkov}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sushkov-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-secret} --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-secret}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

volumes:
  postgres_data:
  redis_data:

networks:
  backend:
    driver: bridge
